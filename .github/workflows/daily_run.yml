name: Daily PEAD Screener

on:
  schedule:
    # Runs at 21:00 UTC = ~2:30am IST / after US market close, before India market open.
    # Adjust to taste -- cron is in UTC.
    - cron: '0 21 * * 1-5'
  workflow_dispatch: {}  # lets you also trigger it manually from the GitHub Actions tab

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily screen
        run: python src/run_daily.py

      - name: Commit updated log
        run: |
          git config user.name "pead-tracker-bot"
          git config user.email "actions@github.com"
          git add data/daily_top_performers_log.csv
          git diff --staged --quiet || git commit -m "Daily PEAD screen: $(date -u +%Y-%m-%d)"
          git push
